# =============================================================================
# Tándem Frontend — Nginx (SPA serve, no API proxy needed)
# API calls go directly to api.tandemapp.es via VITE_API_URL
# =============================================================================

server {
    listen 80;
    server_name tandemapp.es www.tandemapp.es;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # PWA files (service worker, manifest)
    location ~ ^/(sw\.js|manifest\.json)$ {
        add_header Cache-Control "no-cache";
    }

    # ACME challenge — must be handled by Traefik, deny here
    location ^~ /.well-known/acme-challenge/ {
        deny all;
        return 404;
    }

    # Static assets with content hash → long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static files
    location ~* \.(ico|png|jpg|jpeg|gif|svg|xml|txt|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # HTML → no cache (always serve latest SPA shell)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny hidden files and sourcemaps
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.map$ {
        deny all;
        return 404;
    }
}
